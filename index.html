<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8D Audio Music Production</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        

        .full-size-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .full-size-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            position: absolute;
        }
    </style>
</head>
<body>
    <header>
        
    </header>
    <div class="full-size-image-container">

    </div>
</body>
</html>
