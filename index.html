<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css">
    <style>
        
        /* Style for the "About Us" container */
.about-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    background-color: #f5f5f5;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgb(1, 252, 227);
}

/* Style for the heading */
.about-container h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #333;
}

/* Style for the paragraph */
.about-container p {
    font-size: 16px;
    line-height: 1.5;
    color: #666;
}
.social-icons {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center; /* Center horizontally */
  }
  
  .social-icon {
    margin-right: 10px;
  }
  
  .social-icon:last-child {
    margin-right: 0;
  }
  
  .social-icon i {
    font-size: 24px;
    color: #555;
    transition: color 0.3s ease;
  }
  
  .social-icon i:hover {
    color: #007bff;
  }
  .social-icon i.fab.fa-twitter {
    color: #1da1f2;
  }
  
  .social-icon i.fab.fa-instagram {
    color: #c13584;
  }
  .social-icon i.fab.fa-youtube {
    color: #cd201f;
  }
  
  .social-icon i.fab.fa-discord {
    color: #7289da;
  }
    </style>
    <title>About Us</title>
</head>
<body>
    <div class="about-container">
        <h1>About Us</h1>
        <p>8D Audio Music Production is one of the biggest music label. Started by Ayan Singh. All the rights reserved ©️ from T-Series, Zee Music Company and DJ NYK... For the business enquiry - 8dmusicproductionr@gmail.com</p>
    </div>
<br>
<br>

  <!--Social Icons-->
  <div class="social-icons">
    <a href="https://www.youtube.com/@8daudiomusicproduction/featured"target="_main" class="social-icon"><i class="fab fa-youtube"></i></a>
    <a href="https://www.instagram.com/8d_audio_music_production/"target="_main" class="social-icon"><i class="fab fa-instagram"></i></a>
    <a href="https://twitter.com/8daudiomusicpro"target="_main" class="social-icon"><i class="fab fa-twitter"></i></a>
    <a href="https://discord.com/invite/3zz5sXAfBz"target="_main" class="social-icon"><i class="fab fa-discord"></i></a>
  </div>
</body>
</html>
